<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Page</title>

<style>

body{
font-family:Arial;
background:#f4f7fc;
padding:20px;
}

.contact-box{
background:white;
padding:30px;
width:60%;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h1{
text-align:center;
margin-bottom:20px;
color:#0f766e;
}

input,
textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0f766e;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
}

.info{
margin-top:20px;
line-height:2;
}

</style>
</head>

<body>

<div class="contact-box">

<h1>📞 Contact Hospital</h1>

<input type="text"
placeholder="Your Name">

<input type="email"
placeholder="Your Email">

<textarea rows="5"
placeholder="Your Message"></textarea>

<button>
Send Message
</button>

<div class="info">

<p>📍 Address: Hyderabad, Telangana</p>

<p>📞 Phone: +91 9876543210</p>

<p>✉ Email: hospital@gmail.com</p>

</div>

</div>

</body>
</html>
