<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced E-Commerce Website</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4f4f4;
    transition:0.4s;
}

.dark{
    background:#111;
    color:white;
}

.dark .card,
.dark .cart,
.dark .search-box input{
    background:#222;
    color:white;
}

header{
    background:#1e3a8a;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    background:#162d6b;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
    font-weight:bold;
}

nav button{
    background:white;
    color:#1e3a8a;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
}

.hero{
    height:400px;
    background:
    linear-gradient(rgba(0,0,0,0.5),
    rgba(0,0,0,0.5)),
    url('https://images.unsplash.com/photo-1523275335684-37898b6baf30')
    center/cover;

    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:10px;
    font-size:20px;
}

.search-box{
    text-align:center;
    margin:30px;
}

.search-box input{
    width:60%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

.products{
    width:90%;
    margin:auto;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:280px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.card p{
    color:green;
    font-weight:bold;
}

button{
    background:#1e3a8a;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

.cart{
    background:white;
    width:90%;
    margin:40px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

.cart h2{
    margin-bottom:20px;
}

.cart ul{
    list-style:none;
}

.cart li{
    margin:10px 0;
    padding:10px;
    border-bottom:1px solid #ddd;
}

.checkout{
    text-align:center;
    margin-top:20px;
}

footer{
    background:#1e3a8a;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:40px;
}

@media(max-width:768px){

.hero h1{
    font-size:35px;
}

.search-box input{
    width:90%;
}

.products{
    flex-direction:column;
    align-items:center;
}

}

</style>
</head>

<body>

<header>

<h1>🛒 ShopEase</h1>

<p>Advanced E-Commerce Website</p>

</header>

<nav>

<a href="#">Home</a>
<a href="#">Products</a>
<a href="categories.html">Categories</a>
<a href="cart.html">Cart</a>
<a href="econtact.html">Contact</a>

<button onclick="darkMode()">
🌙 Dark Mode
</button>

</nav>

<section class="hero">

<h1>Big Sale Today</h1>

<p>Up to 50% OFF on Electronics</p>

<button>
Shop Now
</button>

</section>

<div class="search-box">

<input type="text"
id="search"
placeholder="Search products..."
onkeyup="searchProducts()">

</div>

<section class="products" id="productList">

<div class="card">

<img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9">

<h3>iPhone 15</h3>

<p>₹79,999</p>

<button onclick="addToCart('iPhone 15')">
Add to Cart
</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e">

<h3>Headphones</h3>

<p>₹2,999</p>

<button onclick="addToCart('Headphones')">
Add to Cart
</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">

<h3>Camera</h3>

<p>₹45,000</p>

<button onclick="addToCart('Camera')">
Add to Cart
</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">

<h3>Shoes</h3>

<p>₹4,500</p>

<button onclick="addToCart('Shoes')">
Add to Cart
</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">

<h3>Smart Watch</h3>

<p>₹6,999</p>

<button onclick="addToCart('Smart Watch')">
Add to Cart
</button>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">

<h3>Fashion Jacket</h3>

<p>₹3,999</p>

<button onclick="addToCart('Fashion Jacket')">
Add to Cart
</button>

</div>

</section>

<section class="cart">

<h2>🛍 Shopping Cart</h2>

<ul id="cartItems">

</ul>

<div class="checkout">

<button onclick="checkout()">
Proceed to Checkout
</button>

</div>

</section>

<footer>

<p>© 2026 ShopEase E-Commerce Website</p>

</footer>

<script>

function darkMode(){

document.body.classList.toggle("dark");

}

function searchProducts(){

let input =
document.getElementById("search")
.value.toLowerCase();

let cards =
document.querySelectorAll(".card");

cards.forEach(card => {

let text =
card.innerText.toLowerCase();

if(text.includes(input)){

card.style.display = "block";

}
else{

card.style.display = "none";

}

});

}

function addToCart(product){

let li =
document.createElement("li");

li.innerHTML =
product + " added to cart";

document.getElementById("cartItems")
.appendChild(li);

}

function checkout(){

alert("Proceeding to Checkout");

}

</script>

</body>
</html>
