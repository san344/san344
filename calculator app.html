<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Calculator App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to right,#8e2de2,#4a00e0);
}

.calculator{
width:350px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
box-shadow:0 0 30px rgba(0,0,0,0.3);
}

.title{
text-align:center;
color:white;
font-size:30px;
margin-bottom:20px;
font-weight:600;
}

.display{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:15px;
padding:20px;
font-size:30px;
text-align:right;
margin-bottom:20px;
background:white;
color:#111827;
font-weight:bold;
box-shadow:inset 0 0 10px rgba(0,0,0,0.1);
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

button{
height:65px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.number{
background:white;
color:#111827;
}

.operator{
background:#f97316;
color:white;
}

.equal{
background:#22c55e;
color:white;
grid-column:span 2;
}

.clear{
background:#ef4444;
color:white;
}

.delete{
background:#3b82f6;
color:white;
}

@media(max-width:400px){

.calculator{
width:95%;
}

button{
height:60px;
font-size:20px;
}

.display{
font-size:25px;
}

}

</style>
</head>

<body>

<div class="calculator">

<h1 class="title">
🧮 Calculator
</h1>

<input type="text"
class="display"
id="display"
readonly>

<div class="buttons">

<button class="clear"
onclick="clearDisplay()">
C
</button>

<button class="delete"
onclick="deleteLast()">
⌫
</button>

<button class="operator"
onclick="appendValue('%')">
%
</button>

<button class="operator"
onclick="appendValue('/')">
÷
</button>

<button class="number"
onclick="appendValue('7')">
7
</button>

<button class="number"
onclick="appendValue('8')">
8
</button>

<button class="number"
onclick="appendValue('9')">
9
</button>

<button class="operator"
onclick="appendValue('*')">
×
</button>

<button class="number"
onclick="appendValue('4')">
4
</button>

<button class="number"
onclick="appendValue('5')">
5
</button>

<button class="number"
onclick="appendValue('6')">
6
</button>

<button class="operator"
onclick="appendValue('-')">
−
</button>

<button class="number"
onclick="appendValue('1')">
1
</button>

<button class="number"
onclick="appendValue('2')">
2
</button>

<button class="number"
onclick="appendValue('3')">
3
</button>

<button class="operator"
onclick="appendValue('+')">
+
</button>

<button class="number"
onclick="appendValue('0')">
0
</button>

<button class="number"
onclick="appendValue('.')">
.
</button>

<button class="equal"
onclick="calculate()">
=
</button>

</div>

</div>

<script>

let display =
document.getElementById("display");

function appendValue(value){

display.value += value;

}

function clearDisplay(){

display.value = "";

}

function deleteLast(){

display.value =
display.value.slice(0,-1);

}

function calculate(){

try{

display.value =
eval(display.value);

}

catch{

display.value = "Error";

}

}

</script>

</body>
</html>
