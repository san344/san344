<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctors Page</title>

<style>

body{
font-family:Arial;
background:#f4f7fc;
padding:20px;
}

h1{
text-align:center;
color:#0f766e;
margin-bottom:30px;
}

.cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
width:250px;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
text-align:center;
}

.card img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

button{
background:#0f766e;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
margin-top:10px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>👨‍⚕️ Our Doctors</h1>

<div class="cards">

<img src="https://randomuser.me/api/portraits/men/32.jpg">

</html>
