<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sticky Notes App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
linear-gradient(135deg,#6366f1,#8b5cf6);
min-height:100vh;
padding:30px;
}

header{
text-align:center;
margin-bottom:40px;
color:white;
}

header h1{
font-size:50px;
margin-bottom:10px;
}

header p{
font-size:20px;
}

.note-form{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
margin-bottom:40px;
}

.note-form input,
.note-form textarea{
width:100%;
padding:15px;
margin:15px 0;
border:none;
border-radius:15px;
background:#f1f5f9;
font-size:16px;
}

.note-form textarea{
height:120px;
resize:none;
}

.note-form button{
width:100%;
padding:15px;
border:none;
border-radius:50px;
background:#6366f1;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
font-weight:bold;
}

.note-form button:hover{
background:#4f46e5;
transform:scale(1.02);
}

.notes-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.note{
padding:25px;
border-radius:20px;
color:#111827;
position:relative;
animation:fadeIn 0.5s ease;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.note h2{
margin-bottom:15px;
font-size:26px;
}

.note p{
line-height:1.7;
margin-bottom:20px;
}

.note button{
padding:10px 18px;
border:none;
border-radius:30px;
background:#ef4444;
color:white;
cursor:pointer;
font-weight:bold;
}

.yellow{
background:#fde68a;
}

.pink{
background:#f9a8d4;
}

.green{
background:#86efac;
}

.blue{
background:#93c5fd;
}

.orange{
background:#fdba74;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:768px){

header h1{
font-size:38px;
}

}

</style>
</head>

<body>

<header>

<h1>
📝 Sticky Notes App
</h1>

<p>
Create colorful notes and stay organized
</p>

</header>

<div class="note-form">

<input type="text"
id="title"
placeholder="Enter Note Title">

<textarea
id="content"
placeholder="Write your note here...">
</textarea>

<button onclick="addNote()">

Add Note

</button>

</div>

<div class="notes-container"
id="notesContainer">

<div class="note yellow">

<h2>Study Plan</h2>

<p>
Complete HTML, CSS and JavaScript practice before Friday.
</p>

<button onclick="deleteNote(this)">
Delete
</button>

</div>

<div class="note pink">

<h2>Shopping List</h2>

<p>
Buy milk, coffee, bread, snacks and fruits from supermarket.
</p>

<button onclick="deleteNote(this)">
Delete
</button>

</div>

<div class="note green">

<h2>Workout</h2>

<p>
Morning gym at 6 AM and evening walk for 30 minutes.
</p>

<button onclick="deleteNote(this)">
Delete
</button>

</div>

</div>

<script>

const colors = [
"yellow",
"pink",
"green",
"blue",
"orange"
];

function addNote(){

let title =
document.getElementById("title").value;

let content =
document.getElementById("content").value;

if(title === "" || content === ""){

alert("Please fill all fields");

return;

}

let note =
document.createElement("div");

let randomColor =
colors[Math.floor(Math.random() * colors.length)];

note.classList.add("note",randomColor);

note.innerHTML =

`<h2>${title}</h2>

<p>${content}</p>

<button onclick="deleteNote(this)">
Delete
</button>`;

document.getElementById("notesContainer")
.appendChild(note);

document.getElementById("title").value = "";

document.getElementById("content").value = "";

}

function deleteNote(button){

button.parentElement.remove();

}

</script>

</body>
</html>
