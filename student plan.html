<script>
function addSubject() {
    let subject = document.getElementById("subject").value;
    let examDate = document.getElementById("examDate").value;

    if(subject === "" || examDate === "") {
        alert("Enter all details");
        return;
    }
    

    let today = new Date();
    let exam = new Date(examDate);

    let diffTime = exam - today;
    let daysLeft = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    let plan = "";

    if(daysLeft > 10) {
        plan = "Study 2 hours daily";
    } else if(daysLeft > 5) {
        plan = "Study 4 hours daily";
    } else {
        plan = "Revise full syllabus daily";
    }

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h3>${subject}</h3>
        <p>📅 Exam Date: ${examDate}</p>
        <p>⏳ Days Left: ${daysLeft}</p>
        <p>📚 Plan: ${plan}</p>
    `;

    document.getElementById("list").appendChild(div);

    document.getElementById("subject").value = "";
}
